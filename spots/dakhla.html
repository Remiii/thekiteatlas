<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --od: #0a1628;
      --sand: #f0d9a8;
      --sl: #faecd4;
      --coral: #ff6b4a;
      --tq: #2dd4bf;
      --sky: #7dd3fc;
      --wi: #a78bfa;
      --sun: #fb923c;
      --tp: #f1f5f9;
      --ts: #94a3b8;
      --gl: rgba(15, 40, 71, 0.6);
      --gb: rgba(255, 255, 255, 0.08);
      --rd: #ef4444;
      --gn: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--od);
      color: var(--tp);
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 20% 80%, rgba(45,212,191,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 80% 50% at 80% 20%, rgba(125,211,252,0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    .G {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1;
    }

    .C { position: relative; z-index: 2; }

    /* ── Top bar ── */
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem;
      z-index: 10;
    }

    .back-link {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; font-weight: 600; color: var(--ts);
      text-decoration: none; letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      background: var(--gl); border: 1px solid var(--gb);
      backdrop-filter: blur(8px);
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--tq); }
    .back-link svg { width: 14px; height: 14px; }

    /* ── Language switcher ── */
    .ls {
      display: flex; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--gb);
    }
    .lb {
      padding: 0.5rem 1rem;
      background: var(--gl); border: none;
      color: var(--ts); font-family: "DM Sans", sans-serif;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s;
      letter-spacing: 0.05em;
    }
    .lb.a { background: var(--tq); color: var(--od); }
    .lb:hover:not(.a) { color: var(--tq); }

    /* ── Hero ── */
    .hero {
      padding: 80px 20px 48px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 70% 20%, rgba(255,107,74,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 30% 80%, rgba(45,212,191,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 16px; border-radius: 100px;
      background: var(--gb); backdrop-filter: blur(8px);
      font-size: 0.7rem; font-weight: 600; color: var(--ts);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 20px; position: relative;
    }
    .hero h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      font-weight: 900; line-height: 1;
      letter-spacing: -0.03em; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--sl), var(--tq), var(--sky));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; position: relative;
    }
    .hero-sub {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-weight: 300; color: var(--ts);
      letter-spacing: 0.02em; max-width: 520px;
      margin: 0 auto 28px; line-height: 1.6;
    }

    /* ── Scores bar ── */
    .scores {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      padding: 16px 20px; max-width: 680px; margin: 0 auto;
      background: var(--gl); backdrop-filter: blur(12px);
      border-radius: 14px; border: 1px solid var(--gb);
    }
    .score-item { text-align: center; flex: 1 1 62px; }
    .score-label {
      font-size: 0.68rem; font-weight: 600; color: var(--ts);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
    }
    .score-dots { display: flex; gap: 3px; justify-content: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); }
    .dot.on { background: var(--sand); }

    /* ── Tabs ── */
    .tabs {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      background: rgba(10,22,40,0.88);
      border-bottom: 1px solid var(--gb);
    }
    .tabs-inner {
      display: flex; overflow-x: auto; scrollbar-width: none;
      max-width: 780px; margin: 0 auto;
    }
    .tabs-inner::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0; padding: 14px 16px;
      background: none; border: none;
      color: var(--ts); font-family: "DM Sans", sans-serif;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s;
      position: relative; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--tq); }
    .tab-btn.a { color: var(--tq); }
    .tab-btn.a::after {
      content: ""; position: absolute; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 60%; height: 2px;
      background: var(--tq); border-radius: 1px;
    }

    /* ── Content ── */
    .content { max-width: 780px; margin: 0 auto; padding: 0 16px; }
    .tab-panel { display: none; padding: 28px 0 40px; }
    .tab-panel.active { display: block; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Section titles ── */
    .section-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 900; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--sand), var(--coral));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-sub {
      font-size: 0.88rem; color: var(--ts); font-weight: 300;
      line-height: 1.6; margin-bottom: 20px; max-width: 600px;
    }

    /* ── Card ── */
    .card {
      background: var(--gl); border: 1px solid var(--gb);
      border-radius: 16px; padding: 22px;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      position: relative; overflow: hidden; margin-bottom: 12px;
    }
    .card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: linear-gradient(90deg, var(--tq), var(--coral));
      opacity: 0; transition: opacity 0.4s;
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.12); box-shadow: 0 16px 48px rgba(0,0,0,0.3); }
    .card:hover::before { opacity: 1; }

    /* ── Tags ── */
    .tag {
      display: inline-block; font-size: 0.68rem; font-weight: 500;
      padding: 3px 10px; border-radius: 100px; letter-spacing: 0.03em;
    }
    .tag-tq  { background: rgba(45,212,191,0.12);  color: var(--tq);  border: 1px solid rgba(45,212,191,0.25); }
    .tag-coral { background: rgba(255,107,74,0.12); color: var(--coral); border: 1px solid rgba(255,107,74,0.25); }
    .tag-wi  { background: rgba(167,139,250,0.15); color: var(--wi);  border: 1px solid rgba(167,139,250,0.25); }
    .tag-sun { background: rgba(251,146,60,0.12);  color: var(--sun); border: 1px solid rgba(251,146,60,0.25); }
    .tag-sky { background: rgba(125,211,252,0.12); color: var(--sky); border: 1px solid rgba(125,211,252,0.2); }
    .tag-gn  { background: rgba(34,197,94,0.12);   color: var(--gn);  border: 1px solid rgba(34,197,94,0.25); }
    .tag-rd  { background: rgba(239,68,68,0.12);   color: var(--rd);  border: 1px solid rgba(239,68,68,0.25); }

    /* ── Wind bars ── */
    .wr { display: flex; gap: 2px; align-items: flex-end; }
    .wb { width: 5px; border-radius: 2px; background: rgba(167,139,250,0.2); }
    .wb.on { background: var(--wi); }

    /* ── Wind chart ── */
    .wind-chart { display: flex; gap: 4px; align-items: flex-end; overflow-x: auto; padding-bottom: 4px; }
    .wind-bar-col { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; min-width: 44px; transition: all 0.2s; }
    .wind-bar-col .pct { font-size: 0.65rem; font-weight: 600; margin-bottom: 3px; flex-shrink: 0; }
    .wind-bar-zone { height: 110px; display: flex; align-items: flex-end; justify-content: center; }
    .wind-bar-col .bar { border-radius: 5px 5px 2px 2px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); width: 30px; }
    .wind-bar-col.sel .bar { width: 38px; box-shadow: 0 4px 16px rgba(245,158,11,0.35); }
    .wind-bar-col .mo-label { font-size: 0.7rem; font-weight: 500; margin-top: 5px; flex-shrink: 0; }

    /* ── Stat grid month ── */
    .stat-grid-month { grid-template-columns: repeat(5, 1fr); }
    @media (max-width: 600px) { .stat-grid-month { grid-template-columns: repeat(2, 1fr); } }

    /* ── Accordion ── */
    .acc-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; gap: 10px; width: 100%;
    }
    .acc-arrow { font-size: 14px; color: var(--ts); transition: transform 0.3s; }
    .acc-body { display: none; padding-top: 14px; border-top: 1px solid var(--gb); margin-top: 14px; }
    .acc-body.open { display: block; animation: fadeUp 0.25s ease; }
    .acc-arrow.open { transform: rotate(180deg); }

    /* ── Detail grid ── */
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .detail-item { padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--gb); }
    .detail-label { font-size: 0.62rem; font-weight: 600; color: var(--ts); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .detail-value { font-size: 0.82rem; font-weight: 500; color: var(--tp); line-height: 1.5; }

    /* ── Stat grid ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-box { padding: 16px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--gb); }
    .stat-label { font-size: 0.6rem; font-weight: 600; color: var(--ts); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--tp); margin-top: 4px; }
    .stat-sub { font-size: 0.75rem; color: var(--ts); margin-top: 2px; }

    /* ── Tip / Warning / Info boxes ── */
    .tip { padding: 14px 16px; border-radius: 12px; margin-top: 10px; background: rgba(251,146,60,0.06); border: 1px solid rgba(251,146,60,0.2); border-left: 3px solid var(--sun); }
    .tip-title { font-size: 0.75rem; font-weight: 700; color: var(--sun); margin-bottom: 4px; }
    .tip-text { font-size: 0.8rem; color: var(--ts); line-height: 1.6; }

    .warning { padding: 14px 16px; border-radius: 12px; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-left: 3px solid var(--rd); }
    .warning-title { font-size: 0.75rem; font-weight: 700; color: var(--rd); margin-bottom: 4px; }
    .warning-text { font-size: 0.8rem; color: var(--ts); line-height: 1.6; }

    .info { padding: 14px 16px; border-radius: 12px; background: rgba(45,212,191,0.06); border: 1px solid rgba(45,212,191,0.2); border-left: 3px solid var(--tq); }
    .info-title { font-size: 0.75rem; font-weight: 700; color: var(--tq); margin-bottom: 4px; }
    .info-text { font-size: 0.8rem; color: var(--ts); line-height: 1.6; }

    /* ── Budget bar ── */
    .budget-bar { display: flex; height: 10px; border-radius: 6px; overflow: hidden; margin: 14px 0; }
    .budget-seg { transition: flex 0.3s ease; }

    /* ── Profile selector ── */
    .profile-grid { display: flex; gap: 8px; margin-bottom: 18px; }
    .profile-btn {
      flex: 1; padding: 12px 8px; border-radius: 12px;
      border: 1px solid var(--gb); background: var(--gl);
      cursor: pointer; font-family: "DM Sans", sans-serif;
      text-align: center; transition: all 0.2s; color: var(--tp);
    }
    .profile-btn.sel { border-color: var(--sand); background: rgba(240,217,168,0.08); }
    .profile-btn .icon { font-size: 1.5rem; }
    .profile-btn .name { font-size: 0.72rem; font-weight: 700; margin-top: 4px; }

    /* ── Footer ── */
    footer { text-align: center; padding: 3rem 1.5rem 2rem; color: var(--ts); font-size: 0.8rem; border-top: 1px solid var(--gb); max-width: 780px; margin: 0 auto; }
    footer .logo { font-family: "Playfair Display", serif; font-size: 1.1rem; font-weight: 900; margin-bottom: 4px; background: linear-gradient(135deg, var(--sl), var(--tq)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .detail-grid { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .hero { padding: 80px 16px 36px; }
      .card { padding: 16px; }
      .profile-grid { flex-wrap: wrap; }
      .profile-btn { flex: 1 1 45%; }
      .topbar { padding: 1rem; }
    }
  </style>
</head>

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let lang = "en";

let selBudget = 1;

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function t(obj) { return typeof obj === "object" && obj !== null && (obj.fr || obj.en) ? (obj[lang] ?? obj.fr ?? obj.en) : obj; }

function dots(n, max=5) {
  return Array.from({length:max}, (_,i) => `<span class="dot${i<n?' on':''}"></span>`).join('');
}

function seasonTag(prob) {
  const u = UI[lang];
  if (prob >= 85) return `<span class="tag tag-sun">${lang==='fr'?'Peak season':'Peak season'}</span>`;
  if (prob >= 70) return `<span class="tag tag-gn">${lang==='fr'?'Bonne saison':'Good season'}</span>`;
  if (prob >= 60) return `<span class="tag tag-sky">${lang==='fr'?'Saison intermédiaire':'Shoulder season'}</span>`;
  return `<span class="tag tag-wi">${lang==='fr'?'Basse saison':'Low season'}</span>`;
}

function levelTag(l) {
  const beginner = ["Débutant","Beginner"];
  const intermediate = ["Intermédiaire","Intermediate"];
  if (beginner.includes(l)) return `<span class="tag tag-gn">${l}</span>`;
  if (intermediate.includes(l)) return `<span class="tag tag-sun">${l}</span>`;
  return `<span class="tag tag-rd">${l}</span>`;
}

/* ═══════════════════════════════════════════════════════════════
   BUILD PANELS

/* ═══════════════════════════════════════════════════════════════
   RENDER FUNCTIONS
   ═══════════════════════════════════════════════════════════════ */
function renderWindChart() {
  const el = document.getElementById('windChart');
  if (!el) return;
  el.innerHTML = WIND.map((m,i) => {
    const h   = (m.prob / 100) * 110;
    const sel = selMonth === i;
    const peak = m.prob >= 85;
    return `<div class="wind-bar-col${sel?' sel':''}" onclick="selectMonth(${i})">
      <span class="pct" style="color:${peak?'var(--sun)':'var(--ts)'}">${m.prob}%</span>
      <div class="wind-bar-zone">
        <div class="bar" style="height:${h}px;background:${sel?'linear-gradient(180deg,var(--sun),var(--coral))':peak?'linear-gradient(180deg,var(--sand),var(--sun))':'linear-gradient(180deg,var(--sky),var(--wi))'};opacity:${sel?1:0.6}"></div>
      </div>
      <span class="mo-label" style="color:${sel?'var(--sun)':'var(--tp)'};font-weight:${sel?700:500}">${t(m.mo)}</span>
    </div>`;
  }).join('');
}

function renderMonthDetail() {
  const el = document.getElementById('monthDetail');
  if (!el) return;
  const d = WIND[selMonth];
  const u = UI[lang];
  el.innerHTML = [
    {l:u.monthDetailLabels[0], v:`${d.avg} kts`,  s:u.monthDetailSubs[0](d)},
    {l:u.monthDetailLabels[1], v:`${d.air}°C air`, s:u.monthDetailSubs[1](d)},
    {l:u.monthDetailLabels[2], v:d.kites,           s:u.monthDetailSubs[2](d)},
    {l:u.monthDetailLabels[3], v:d.dir,             s:u.monthDetailSubs[3](d)},
    {l:u.monthDetailLabels[4], v:`${d.rise} → ${d.set}`, s:u.monthDetailSubs[4](d)},
  ].map(x=>`<div class="stat-box"><div class="stat-label">${x.l}</div><div class="stat-value">${x.v}</div><div class="stat-sub">${x.s}</div></div>`).join('');
}

function renderBudget() {
  const grid = document.getElementById('profileGrid');
  const card = document.getElementById('budgetCard');
  if (!grid || !card) return;
  const u = UI[lang];
  const days = 7;

  grid.innerHTML = BUDGETS.map((b,i)=>`
    <div class="profile-btn${selBudget===i?' sel':''}" onclick="selectBudget(${i})">
      <div class="icon">${b.icon}</div>
      <div class="name">${t(b.name)}</div>
    </div>
  `).join('');

  const b = BUDGETS[selBudget];
  const items = [
    {l:u.budgetItems[0],          v:b.flight,       c:"var(--wi)"},
    {l:u.budgetItems[1](days),    v:b.accom*days,   c:"var(--sky)"},
    {l:u.budgetItems[2],          v:b.gear*days,    c:"var(--sun)"},
    {l:u.budgetItems[3],          v:b.extras*days,  c:"var(--tq)"},
  ];
  const total = items.reduce((s,x)=>s+x.v, 0);

  card.innerHTML = `
    <div style="text-align:center;margin-bottom:18px">
      <div class="stat-label">${u.budgetTotalLabel}</div>
      <div style="font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;margin-top:4px;background:linear-gradient(135deg,var(--sl),var(--sand));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${total.toLocaleString()}€</div>
      <div style="font-size:0.82rem;color:var(--ts);margin-top:2px">${u.budgetPerDay(total)}</div>
    </div>
    <div class="budget-bar">${items.map(it=>`<div class="budget-seg" style="flex:${it.v/total};background:${it.c}"></div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${items.map(it=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px">
          <div style="width:10px;height:10px;border-radius:50%;background:${it.c};flex-shrink:0"></div>
          <div style="flex:1"><div style="font-size:0.75rem;font-weight:600;color:var(--tp)">${it.l}</div><div style="font-size:0.88rem;font-weight:700;color:${it.c}">${it.v}€</div></div>
        </div>
      `).join('')}
    </div>
    <div class="tip" style="margin-top:14px">
      <div class="tip-title">${u.budgetTipTitle}</div>
      <div class="tip-text">${t(b.note)}</div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   INTERACTIONS
   ═══════════════════════════════════════════════════════════════ */
function selectMonth(i) {
  selMonth = i;
  renderWindChart();
  renderMonthDetail();
}

function selectBudget(i) {
  selBudget = i;
  renderBudget();
}

function toggleSpot(i) {
  document.getElementById('body-spot-'+i).classList.toggle('open');
  document.getElementById('arrow-spot-'+i).classList.toggle('open');
}

function toggleCamp(i) {
  document.getElementById('body-camp-'+i).classList.toggle('open');
  document.getElementById('arrow-camp-'+i).classList.toggle('open');
}

/* Tabs */
document.getElementById('tabsBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('a'));
  btn.classList.add('a');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
});

/* ═══════════════════════════════════════════════════════════════
   LANGUAGE SWITCH
   ═══════════════════════════════════════════════════════════════ */
function switchLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('a', b.dataset.lang === l));

  const u = UI[l];
  document.getElementById('heroBadge').textContent  = u.badge;
  document.getElementById('heroSub').textContent    = u.heroSub;
  document.getElementById('footerSub').textContent  = u.footerSub;
  document.getElementById('footerWarn').textContent = u.footerWarn;

  /* Scores */
  const scoreValues = [5,5,4,4,5,4,3,4];
  document.getElementById('scores').innerHTML = u.scores.map((label,i)=>
    `<div class="score-item"><div class="score-label">${label}</div><div class="score-dots">${dots(scoreValues[i])}</div></div>`
  ).join('');

  /* Tabs */
  const tabIds = ["overview","spots","camps","activities","practical","budget"];
  document.getElementById('tabsBar').innerHTML = u.tabs.map((label,i)=>
    `<button class="tab-btn${i===0?' a':''}" data-tab="${tabIds[i]}">${label}</button>`
  ).join('');

  /* Restore active tab */
  const activePanel = document.querySelector('.tab-panel.active');
  const activeId = activePanel ? activePanel.id.replace('panel-','') : 'overview';

  buildPanels();

  /* Re-activate previously active tab */
  const btn = document.querySelector(`.tab-btn[data-tab="${activeId}"]`);
  if (btn && activeId !== 'overview') {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('a'));
    btn.classList.add('a');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-'+activeId);
    if (panel) panel.classList.add('active');
  }
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
const browserLang = (navigator.languages || [navigator.language || 'en'])
  .some(l => l.toLowerCase().startsWith('fr')) ? 'fr' : 'en';
switchLang(browserLang);
</script>
